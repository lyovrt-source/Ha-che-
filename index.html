<!DOCTYPE html>
<html lang="hy">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta charset="UTF-8">
    <title>Black & Yellow Destiny</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #FF0000, #FFD700, #FFD700, #FF0000);
            background-size: 400% 100%;
            animation: yellowGradient 20s ease infinite;
            font-family: 'Arial Armenian', 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Իջեցված տեքստ՝ գույների փոփոխությամբ */
        .love-message {
            position: absolute;
            top: 150px; /* Էլի իջեցրեցի */
            font-size: 45px;
            font-weight: bold;
            text-align: center;
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 3px solid #000;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            
            /* Անիմացիաներ՝ բաբախյուն և գույների փոփոխություն */
            animation: heartbeat 2.5s ease-in-out infinite, colorShift 6s linear infinite;
        }

        /* Գույների փոփոխության էֆեկտը */
        @keyframes colorShift {
            0% { color: #000000; text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5); }
            33% { color: #d40000; text-shadow: 2px 2px 15px rgba(255, 0, 0, 0.7); }
            66% { color: #8e44ad; text-shadow: 2px 2px 15px rgba(142, 68, 173, 0.7); }
            100% { color: #000000; text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes yellowGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            perspective: 1500px;
            margin-top: 180px; 
        }

        .ball {
            width: 500px; 
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1.1);
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            font-weight: 900;
            backface-visibility: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.3);
        }

        .front {
            background: #f1c40f;
            color: #000;
            border: 40px solid #000;
            transform: rotateY(0deg);
        }

        .back {
            background: #000;
            color: #f1c40f;
            border: 40px solid #f1c40f;
            transform: rotateY(180deg);
        }

        .side::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 40px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="love-message">
        Մարի Լյովը քեզ շատ ա սիրում 😍
    </div>

    <div class="container">
        <div class="ball" id="ball" onclick="crazySpin()">
            <div class="side front">ԱՅՈ</div>
            <div class="side back">ՈՉ</div>
        </div>
    </div>

    <script>
        // Քեշի մաքրման ֆունկցիան
        window.onload = function() {
            localStorage.clear();
            sessionStorage.clear();
            if(!window.location.hash.includes('no-cache')) {
                window.location.hash = 'no-cache';
                window.location.reload(true);
            }
        };

        let rotationY = 0;
        let spinning = false;

        function crazySpin() {
            if (spinning) return;
            spinning = true;

            const ball = document.getElementById('ball');
            
            const rounds = (Math.floor(Math.random() * 5) + 7) * 360; 
            const side = Math.random() > 0.5 ? 0 : 180;
            
            rotationY += rounds + side + (360 - (rotationY % 360));

            const tiltX = Math.floor(Math.random() * 100) - 50; 
            const tiltZ = Math.floor(Math.random() * 60) - 30;

            ball.style.transform = `rotateY(${rotationY}deg) rotateX(${tiltX}deg) rotateZ(${tiltZ}deg)`;

            setTimeout(() => {
                ball.style.transform = `rotateY(${rotationY}deg) rotateX(0deg) rotateZ(0deg)`;
                spinning = false;
            }, 3500);
        }
    </script>

</body>
</html>
